                                "title": "Web 3.0 — A New Web-volution",
                                "pubDate": "2021-12-04 11:58:51",
                                "link": "https://medium.com/tech-iiitg/web-3-0-a-new-web-volution-1970873089a3?source=rss-c660f17ebebd------2",
                                "guid": "https://medium.com/p/1970873089a3",
                                "author": "Kailash Kejriwal",
                                "thumbnail": "https://cdn-images-1.medium.com/max/1024/0*X9KCGT1yNWDFvEu3.png",
                                "description": "\n\u003ch3\u003eWeb 3.0 — A New Web-volution\u003c/h3\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*X9KCGT1yNWDFvEu3.png\"\u003e\u003c/figure\u003e\u003cp\u003eHistory has taught us that only change is constant, and drastic changes are not a matter of surprise when it comes to the field of any technology — more specifically, in Web Development. The web has changed a lot over the past few decades and yet again we have a new revolution in this domain — the \u003cstrong\u003eWeb 3.0\u003c/strong\u003e. In this article I will discuss what exactly is web3 and how it is going to transform how the web architecture works.\u003c/p\u003e\n\u003ch3\u003eWhat are Web 1.0 and Web 2.0?\u003c/h3\u003e\n\u003cp\u003eBefore explaining what Web 3.0 is, let me brief you about \u003cstrong\u003eWeb 1.0\u003c/strong\u003e and \u003cstrong\u003eWeb 2.0\u003c/strong\u003e. If you have ever visited \u003ca href=\"https://www.wikipedia.org/\"\u003e\u003cstrong\u003e\u003cem\u003eWikipedia\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e in your childhood , or maybe surfed these news channels — \u003ca href=\"https://web.archive.org/web/20000815052826/http://cnn.com/\"\u003e\u003cstrong\u003e\u003cem\u003eCNN.com\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e , then you have noticed you could only view the data in the website — you could not send back any data from your end, or maybe interact much with the website. This was Web 1.0 — where the user can only read the data in the static web pages.\u003c/p\u003e\n\u003cp\u003eThen, there appeared Web 2.0. This version of the web allowed interaction with the webpages. Most of the websites we see today, including \u003ca href=\"https://www.facebook.com/\"\u003e\u003cstrong\u003e\u003cem\u003eFacebook\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e, \u003ca href=\"https://www.youtube.com/\"\u003e\u003cstrong\u003e\u003cem\u003eYouTube\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e — where the user can interact with the website and send data from his/her end, laid the foundation of Web 2.0. It changed the way we used the internet; there was a tech-boom. Some may argue that after the advent of Cloud Computing (using someone else’s resources in exchange of money) also revolutionized the web, so it “may” be termed as Web 2.5. Then finally, we have the Web 3.0.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*0jMIwzy7uPwhKfyr\"\u003e\u003c/figure\u003e\u003ch3\u003eWhat was the need of Web 3.0?\u003c/h3\u003e\n\u003cp\u003eOne may ask, when the current web seemed to be absolutely fine, with a lot of users adding to it daily, what was the need to bring a change? Why did we bring Web 3.0 when Web 2.0 can already fulfill our needs?\u003c/p\u003e\n\u003cp\u003eThere are a number of severe hazards that exist in the current web. We know it, we see it, yet we ignore it. If you regularly read news, you have frequently heard that the user data of some XYZ company was leaked online, or stolen by cyber-attackers or ‘hackers’. You must have heard about the recent Facebook data leak\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.technologyreview.com/2021/04/07/1021892/facebook-data-leak/\"\u003eWhat you need to know about the Facebook data leak\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eA question arose as to why the incident happened and whether it could be prevented in the future.\u003c/p\u003e\n\u003cp\u003eAgain, content like posts, videos are often put down from the internet due to the intervention of any third party — be it the government, or any other organization.\u003c/p\u003e\n\u003cp\u003eCan this be fixed and the internet be more transparent? All of these answers lie in Web 3.0.\u003c/p\u003e\n\u003ch3\u003eWhat is Web3?\u003c/h3\u003e\n\u003cp\u003eNow, after such a long discussion, let me tell you what \u003cstrong\u003eWeb 3.0\u003c/strong\u003e is.\u003c/p\u003e\n\u003cblockquote\u003eWeb3 is a backend revolution. It’s a set of protocols led by blockchain, that intends to reinvent how the Internet is wired.\u003c/blockquote\u003e\n\u003cblockquote\u003e— someone on the internet\u003c/blockquote\u003e\n\u003cp\u003eThe sentence above may sound a bit tongue-twisting. Let’s follow with an example.\u003c/p\u003e\n\u003cp\u003eSuppose you had 30 rupees and you lent your 3 friends — Jack, Rose and Martha, 10 rupees each. So now, each of your friends have 10 rupees. Also you have informed everyone about these lending and everyone knows who owes what amount and to whom. Now, Jack returns you back 10 rupees. So he doesn’t owe you anything. At the same time, you also inform everyone else that Jack has paid back his money and is free from your debt. So, when these transactions happened, everyone else involved in this system got informed.\u003c/p\u003e\n\u003cp\u003eThe above scenario depicts a blockchain, where the same copy of a single ledger (a record of transactions) is maintained with everyone involved in the system. Every time, a new transaction takes place (like Jack paying back his money), the ledger gets updated for everyone, just like you informed everyone else about the transaction. This is also known as Decentralization, or keeping the same copy of data distributed or spread throughout the network.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/601/0*b325LiHaMsAw0qgq\"\u003e\u003c/figure\u003e\u003cp\u003eWeb 3.0 uses this concept of Decentralization to solve a lot of problems. In Web 3.0, the data of the users is not stored in a company-backed database, rather it is distributed throughout the decentralized network. So every time a transaction happens, the data at each of the nodes (term for the users involved in the system) gets updated and that too in an encrypted way. Simple, isn’t it?\u003c/p\u003e\n\u003ch3\u003eHow does Web 3.0 work?\u003c/h3\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/624/0*CbSxBc8NFJvFxV8q\"\u003e\u003c/figure\u003e\u003cp\u003eWeb 3.0 is implemented in the frontend section of an application. The web3 package contains a collection of libraries that are used to connect the client to the decentralized blockchain-based backend. Now, if you ask how exactly web3 functions, it is not as complicated as it sounds.\u003c/p\u003e\n\u003cp\u003eweb3 behaves like a wrapper on the JSON RPC protocol. In JSON RPC protocol, the client makes a request stating the method to implement, the parameters to be passed as inputs, etc. in JSON format, and the server (here the blockchain system) executes the methods in the request.\u003c/p\u003e\n\u003cp\u003eThe client generally uses a wallet like \u003ca href=\"https://metamask.io/\"\u003e\u003cstrong\u003eMetaMask\u003c/strong\u003e\u003c/a\u003e that acts as a provider, or a medium of interaction with the backend.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/676/0*1Tzdm2PqRE-71JIP\"\u003e\u003c/figure\u003e\u003cp\u003eNow, let us see how Web 3.0 is implemented. To discuss the hands-on implementation of Web 3.0 and integrating it in a DApp, it may require an entire article; so our discussion will be limited to using the basic functionalities of Web3.0.\u003c/p\u003e\n\u003cp\u003eTo start with Web 3.0 in JavaScript, we have to install the web3 package using the following command\u003c/p\u003e\n\u003cpre\u003enpm i web3\u003c/pre\u003e\n\u003cp\u003eNext, we will need to import the web3 package and initialize the Web3 instance using a provider. A \u003cstrong\u003e\u003cem\u003eProvider\u003c/em\u003e\u003c/strong\u003e, in simple words, is the URL of the blockchain network you want to connect to. Generally, if you are running Ganache, you have a test network running on your device, and the URL will be \u003ca href=\"https://localhost:7545/\"\u003ehttps://localhost:7545\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eGanache is a tool that runs a blockchain test network on your local device. It provides some free Ethereum accounts that can be used to test your blockchain application. You can learn more about Ganache from here.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.trufflesuite.com/ganache\"\u003eGanache | Truffle Suite\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eWe can import the package using any of the methods\u003c/p\u003e\n\u003cpre\u003econst Web3 = require (“web3”)\u003cbr\u003e//or ES6\u003cbr\u003eimport Web3 from “web3”\u003c/pre\u003e\n\u003cp\u003eWe can now create the instance\u003c/p\u003e\n\u003cpre\u003econst web3 = new Web3(Web3.givenProvider || “https://localhost://7545”)\u003c/pre\u003e\n\u003cp\u003eNow, we will create a contract instance using the ABI and contract address.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cem\u003eABI\u003c/em\u003e\u003c/strong\u003e refers to the JSON data that contains the information of the smart contract. It contains the data of all the public methods, public variables, events, etc. within the smart contract.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cem\u003eContract address\u003c/em\u003e\u003c/strong\u003e is generated when the contract is deployed in the Ethereum network. The address comes from the creator’s address and the number of transactions sent from that address (the “nonce”)\u003c/p\u003e\n\u003cpre\u003econst contract = new web3.eth.Contract(abi,address)\u003c/pre\u003e\n\u003cp\u003eNow, we have successfully connected to the backend and can access the public variables, methods and events on the smart contract. You may ask how we do that.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003econtract.variable().call() \u003c/strong\u003e: For every public variable you define inside the smart contract, Web3 creates a method with the same name as the variable, so that you can access it. Although, the .call() needs to be concatenated after the function name to execute it.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003econtract.methods\u003c/strong\u003e : All the public functions that you have defined inside the smart contracts are accessed using this property.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAgain, there are some other essential functions which are included inside the web3.utils library that help to implement the frontend logic, like\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eweb3.eth.accounts()\u003c/strong\u003e : this method returns all the accounts currently associated with the current user\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eweb3.utils.toWei()\u003c/strong\u003e : this method helps to convert any number to Wei, the smallest unit of Ether\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e1 Ether = 1000000000000000000 Wei\u003c/blockquote\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003eweb3.utils.BN()\u003c/strong\u003e : Like the above method, this function helps to convert a number to a Big Number.\u003c/li\u003e\u003c/ul\u003e\n\u003cblockquote\u003eBN is a object whose constructor returns a big number primitive — also called a Big Number value, or sometimes just a BN — to represent \u003cstrong\u003ewhole numbers larger than ²⁵³ — 1\u003c/strong\u003e ( Number. MAX_SAFE_INTEGER ), which is the largest number JavaScript can represent with a number primitive (or Number value).\u003c/blockquote\u003e\n\u003cp\u003eAll the methods, and more information about implementing the web3 library can be found from their official documentation.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/ethereum/web3.js#readme\"\u003eGitHub - ChainSafe/web3.js: Ethereum JavaScript API\u003c/a\u003e\u003c/p\u003e\n\u003ch3\u003eHow does Web 3.0 benefit us?\u003c/h3\u003e\n\u003cp\u003eWe have discussed the technical side of Web 3.0, but we have hardly seen how it will benefit the users.\u003c/p\u003e\n\u003cp\u003eTo start with, since data in Web 3.0 is distributed throughout the network in an encrypted way, no company can access your personal data and sell it to advertisers, like they have been doing over the past few years. This makes the user the owner of his/her data.\u003c/p\u003e\n\u003cp\u003eImmutability is one of the founding concepts of blockchain, and this strengthens Web 3.0. The content which is once uploaded using Web 3.0 cannot be deleted. So, no third party will be able to take down any content out of their own interest.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*X0pZtmM_foi-8nt5.png\"\u003e\u003c/figure\u003e\u003cp\u003eSince data is distributed throughout the blockchain system, and the system is managed completely, by the users, there is no point of a system failure as in the case of a company, and this can keep Web 3.0 running without any issue. Further, the data is accessible from any point in the world at a much faster rate.\u003c/p\u003e\n\u003cp\u003eAgain, Web 3.0 also allows the execution of transactions that remain transparent to everyone. There is no middleman involved, This makes Web 3.0 more secure and safe.\u003c/p\u003e\n\u003ch3\u003eIs Web 3.0 worth it?\u003c/h3\u003e\n\u003cp\u003eSome may argue that Web 3.0 is a very advanced technology and it will be too difficult to shift from the current Web 2.0-based technology to a Web 3.0 architecture. To be specific, the older devices will not be able to adapt to this tech. Further, the concept of Web 3.0 involves a lot of fields and it can get difficult for a beginner to on-board with this technology.\u003c/p\u003e\n\u003cp\u003eStill, considering the level of security, safety and speed that Web 3.0 provides, it can definitely be said that Web3 will be worth it.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/480/0*gMkfqjAz6xmza5Hi\"\u003e\u003c/figure\u003e\u003cp\u003eSo, you have now understood what Web 3.0 is, how it works and why it is needed. The multinational companies are adapting these technologies at a great pace, and the concept of Cryptocurrency has further drawn the attention of the common folks.\u003c/p\u003e\n\u003cp\u003eHappy Coding! 💻\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=1970873089a3\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\n\u003cp\u003e\u003ca href=\"https://medium.com/tech-iiitg/web-3-0-a-new-web-volution-1970873089a3\"\u003eWeb 3.0 — A New Web-volution\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/tech-iiitg\"\u003etech@iiit-gwalior\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e\n",
                                "content": "\n\u003ch3\u003eWeb 3.0 — A New Web-volution\u003c/h3\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*X9KCGT1yNWDFvEu3.png\"\u003e\u003c/figure\u003e\u003cp\u003eHistory has taught us that only change is constant, and drastic changes are not a matter of surprise when it comes to the field of any technology — more specifically, in Web Development. The web has changed a lot over the past few decades and yet again we have a new revolution in this domain — the \u003cstrong\u003eWeb 3.0\u003c/strong\u003e. In this article I will discuss what exactly is web3 and how it is going to transform how the web architecture works.\u003c/p\u003e\n\u003ch3\u003eWhat are Web 1.0 and Web 2.0?\u003c/h3\u003e\n\u003cp\u003eBefore explaining what Web 3.0 is, let me brief you about \u003cstrong\u003eWeb 1.0\u003c/strong\u003e and \u003cstrong\u003eWeb 2.0\u003c/strong\u003e. If you have ever visited \u003ca href=\"https://www.wikipedia.org/\"\u003e\u003cstrong\u003e\u003cem\u003eWikipedia\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e in your childhood , or maybe surfed these news channels — \u003ca href=\"https://web.archive.org/web/20000815052826/http://cnn.com/\"\u003e\u003cstrong\u003e\u003cem\u003eCNN.com\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e , then you have noticed you could only view the data in the website — you could not send back any data from your end, or maybe interact much with the website. This was Web 1.0 — where the user can only read the data in the static web pages.\u003c/p\u003e\n\u003cp\u003eThen, there appeared Web 2.0. This version of the web allowed interaction with the webpages. Most of the websites we see today, including \u003ca href=\"https://www.facebook.com/\"\u003e\u003cstrong\u003e\u003cem\u003eFacebook\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e, \u003ca href=\"https://www.youtube.com/\"\u003e\u003cstrong\u003e\u003cem\u003eYouTube\u003c/em\u003e\u003c/strong\u003e\u003c/a\u003e — where the user can interact with the website and send data from his/her end, laid the foundation of Web 2.0. It changed the way we used the internet; there was a tech-boom. Some may argue that after the advent of Cloud Computing (using someone else’s resources in exchange of money) also revolutionized the web, so it “may” be termed as Web 2.5. Then finally, we have the Web 3.0.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*0jMIwzy7uPwhKfyr\"\u003e\u003c/figure\u003e\u003ch3\u003eWhat was the need of Web 3.0?\u003c/h3\u003e\n\u003cp\u003eOne may ask, when the current web seemed to be absolutely fine, with a lot of users adding to it daily, what was the need to bring a change? Why did we bring Web 3.0 when Web 2.0 can already fulfill our needs?\u003c/p\u003e\n\u003cp\u003eThere are a number of severe hazards that exist in the current web. We know it, we see it, yet we ignore it. If you regularly read news, you have frequently heard that the user data of some XYZ company was leaked online, or stolen by cyber-attackers or ‘hackers’. You must have heard about the recent Facebook data leak\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.technologyreview.com/2021/04/07/1021892/facebook-data-leak/\"\u003eWhat you need to know about the Facebook data leak\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eA question arose as to why the incident happened and whether it could be prevented in the future.\u003c/p\u003e\n\u003cp\u003eAgain, content like posts, videos are often put down from the internet due to the intervention of any third party — be it the government, or any other organization.\u003c/p\u003e\n\u003cp\u003eCan this be fixed and the internet be more transparent? All of these answers lie in Web 3.0.\u003c/p\u003e\n\u003ch3\u003eWhat is Web3?\u003c/h3\u003e\n\u003cp\u003eNow, after such a long discussion, let me tell you what \u003cstrong\u003eWeb 3.0\u003c/strong\u003e is.\u003c/p\u003e\n\u003cblockquote\u003eWeb3 is a backend revolution. It’s a set of protocols led by blockchain, that intends to reinvent how the Internet is wired.\u003c/blockquote\u003e\n\u003cblockquote\u003e— someone on the internet\u003c/blockquote\u003e\n\u003cp\u003eThe sentence above may sound a bit tongue-twisting. Let’s follow with an example.\u003c/p\u003e\n\u003cp\u003eSuppose you had 30 rupees and you lent your 3 friends — Jack, Rose and Martha, 10 rupees each. So now, each of your friends have 10 rupees. Also you have informed everyone about these lending and everyone knows who owes what amount and to whom. Now, Jack returns you back 10 rupees. So he doesn’t owe you anything. At the same time, you also inform everyone else that Jack has paid back his money and is free from your debt. So, when these transactions happened, everyone else involved in this system got informed.\u003c/p\u003e\n\u003cp\u003eThe above scenario depicts a blockchain, where the same copy of a single ledger (a record of transactions) is maintained with everyone involved in the system. Every time, a new transaction takes place (like Jack paying back his money), the ledger gets updated for everyone, just like you informed everyone else about the transaction. This is also known as Decentralization, or keeping the same copy of data distributed or spread throughout the network.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/601/0*b325LiHaMsAw0qgq\"\u003e\u003c/figure\u003e\u003cp\u003eWeb 3.0 uses this concept of Decentralization to solve a lot of problems. In Web 3.0, the data of the users is not stored in a company-backed database, rather it is distributed throughout the decentralized network. So every time a transaction happens, the data at each of the nodes (term for the users involved in the system) gets updated and that too in an encrypted way. Simple, isn’t it?\u003c/p\u003e\n\u003ch3\u003eHow does Web 3.0 work?\u003c/h3\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/624/0*CbSxBc8NFJvFxV8q\"\u003e\u003c/figure\u003e\u003cp\u003eWeb 3.0 is implemented in the frontend section of an application. The web3 package contains a collection of libraries that are used to connect the client to the decentralized blockchain-based backend. Now, if you ask how exactly web3 functions, it is not as complicated as it sounds.\u003c/p\u003e\n\u003cp\u003eweb3 behaves like a wrapper on the JSON RPC protocol. In JSON RPC protocol, the client makes a request stating the method to implement, the parameters to be passed as inputs, etc. in JSON format, and the server (here the blockchain system) executes the methods in the request.\u003c/p\u003e\n\u003cp\u003eThe client generally uses a wallet like \u003ca href=\"https://metamask.io/\"\u003e\u003cstrong\u003eMetaMask\u003c/strong\u003e\u003c/a\u003e that acts as a provider, or a medium of interaction with the backend.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/676/0*1Tzdm2PqRE-71JIP\"\u003e\u003c/figure\u003e\u003cp\u003eNow, let us see how Web 3.0 is implemented. To discuss the hands-on implementation of Web 3.0 and integrating it in a DApp, it may require an entire article; so our discussion will be limited to using the basic functionalities of Web3.0.\u003c/p\u003e\n\u003cp\u003eTo start with Web 3.0 in JavaScript, we have to install the web3 package using the following command\u003c/p\u003e\n\u003cpre\u003enpm i web3\u003c/pre\u003e\n\u003cp\u003eNext, we will need to import the web3 package and initialize the Web3 instance using a provider. A \u003cstrong\u003e\u003cem\u003eProvider\u003c/em\u003e\u003c/strong\u003e, in simple words, is the URL of the blockchain network you want to connect to. Generally, if you are running Ganache, you have a test network running on your device, and the URL will be \u003ca href=\"https://localhost:7545/\"\u003ehttps://localhost:7545\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eGanache is a tool that runs a blockchain test network on your local device. It provides some free Ethereum accounts that can be used to test your blockchain application. You can learn more about Ganache from here.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.trufflesuite.com/ganache\"\u003eGanache | Truffle Suite\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eWe can import the package using any of the methods\u003c/p\u003e\n\u003cpre\u003econst Web3 = require (“web3”)\u003cbr\u003e//or ES6\u003cbr\u003eimport Web3 from “web3”\u003c/pre\u003e\n\u003cp\u003eWe can now create the instance\u003c/p\u003e\n\u003cpre\u003econst web3 = new Web3(Web3.givenProvider || “https://localhost://7545”)\u003c/pre\u003e\n\u003cp\u003eNow, we will create a contract instance using the ABI and contract address.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cem\u003eABI\u003c/em\u003e\u003c/strong\u003e refers to the JSON data that contains the information of the smart contract. It contains the data of all the public methods, public variables, events, etc. within the smart contract.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cem\u003eContract address\u003c/em\u003e\u003c/strong\u003e is generated when the contract is deployed in the Ethereum network. The address comes from the creator’s address and the number of transactions sent from that address (the “nonce”)\u003c/p\u003e\n\u003cpre\u003econst contract = new web3.eth.Contract(abi,address)\u003c/pre\u003e\n\u003cp\u003eNow, we have successfully connected to the backend and can access the public variables, methods and events on the smart contract. You may ask how we do that.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003econtract.variable().call() \u003c/strong\u003e: For every public variable you define inside the smart contract, Web3 creates a method with the same name as the variable, so that you can access it. Although, the .call() needs to be concatenated after the function name to execute it.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003econtract.methods\u003c/strong\u003e : All the public functions that you have defined inside the smart contracts are accessed using this property.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAgain, there are some other essential functions which are included inside the web3.utils library that help to implement the frontend logic, like\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eweb3.eth.accounts()\u003c/strong\u003e : this method returns all the accounts currently associated with the current user\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eweb3.utils.toWei()\u003c/strong\u003e : this method helps to convert any number to Wei, the smallest unit of Ether\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e1 Ether = 1000000000000000000 Wei\u003c/blockquote\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003eweb3.utils.BN()\u003c/strong\u003e : Like the above method, this function helps to convert a number to a Big Number.\u003c/li\u003e\u003c/ul\u003e\n\u003cblockquote\u003eBN is a object whose constructor returns a big number primitive — also called a Big Number value, or sometimes just a BN — to represent \u003cstrong\u003ewhole numbers larger than ²⁵³ — 1\u003c/strong\u003e ( Number. MAX_SAFE_INTEGER ), which is the largest number JavaScript can represent with a number primitive (or Number value).\u003c/blockquote\u003e\n\u003cp\u003eAll the methods, and more information about implementing the web3 library can be found from their official documentation.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/ethereum/web3.js#readme\"\u003eGitHub - ChainSafe/web3.js: Ethereum JavaScript API\u003c/a\u003e\u003c/p\u003e\n\u003ch3\u003eHow does Web 3.0 benefit us?\u003c/h3\u003e\n\u003cp\u003eWe have discussed the technical side of Web 3.0, but we have hardly seen how it will benefit the users.\u003c/p\u003e\n\u003cp\u003eTo start with, since data in Web 3.0 is distributed throughout the network in an encrypted way, no company can access your personal data and sell it to advertisers, like they have been doing over the past few years. This makes the user the owner of his/her data.\u003c/p\u003e\n\u003cp\u003eImmutability is one of the founding concepts of blockchain, and this strengthens Web 3.0. The content which is once uploaded using Web 3.0 cannot be deleted. So, no third party will be able to take down any content out of their own interest.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*X0pZtmM_foi-8nt5.png\"\u003e\u003c/figure\u003e\u003cp\u003eSince data is distributed throughout the blockchain system, and the system is managed completely, by the users, there is no point of a system failure as in the case of a company, and this can keep Web 3.0 running without any issue. Further, the data is accessible from any point in the world at a much faster rate.\u003c/p\u003e\n\u003cp\u003eAgain, Web 3.0 also allows the execution of transactions that remain transparent to everyone. There is no middleman involved, This makes Web 3.0 more secure and safe.\u003c/p\u003e\n\u003ch3\u003eIs Web 3.0 worth it?\u003c/h3\u003e\n\u003cp\u003eSome may argue that Web 3.0 is a very advanced technology and it will be too difficult to shift from the current Web 2.0-based technology to a Web 3.0 architecture. To be specific, the older devices will not be able to adapt to this tech. Further, the concept of Web 3.0 involves a lot of fields and it can get difficult for a beginner to on-board with this technology.\u003c/p\u003e\n\u003cp\u003eStill, considering the level of security, safety and speed that Web 3.0 provides, it can definitely be said that Web3 will be worth it.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/480/0*gMkfqjAz6xmza5Hi\"\u003e\u003c/figure\u003e\u003cp\u003eSo, you have now understood what Web 3.0 is, how it works and why it is needed. The multinational companies are adapting these technologies at a great pace, and the concept of Cryptocurrency has further drawn the attention of the common folks.\u003c/p\u003e\n\u003cp\u003eHappy Coding! 💻\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=1970873089a3\" width=\"1\" height=\"1\" alt=\"\"\u003e\u003chr\u003e\n\u003cp\u003e\u003ca href=\"https://medium.com/tech-iiitg/web-3-0-a-new-web-volution-1970873089a3\"\u003eWeb 3.0 — A New Web-volution\u003c/a\u003e was originally published in \u003ca href=\"https://medium.com/tech-iiitg\"\u003etech@iiit-gwalior\u003c/a\u003e on Medium, where people are continuing the conversation by highlighting and responding to this story.\u003c/p\u003e\n",

                                "title": "Handling Requests on Server-side",
                                "pubDate": "2021-10-25 12:21:03",
                                "link": "https://medium.com/@kailash360/handling-requests-on-server-side-1cef8f59a99a?source=rss-c660f17ebebd------2",
                                "guid": "https://medium.com/p/1cef8f59a99a",
                                "author": "Kailash Kejriwal",
                                "thumbnail": "https://cdn-images-1.medium.com/max/1024/1*WAjU6RbBrNVCybaocLnfNw.jpeg",
                                "description": "\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*WAjU6RbBrNVCybaocLnfNw.jpeg\"\u003e\u003c/figure\u003e\u003cp\u003eIn my \u003ca href=\"https://medium.com/@kailash360\"\u003elast few blogs\u003c/a\u003e, I have discussed creating a NodeJS-based server, the different types of requests sent to the server and handling the response we get back from it. Now one may ask how will a server handle these requests? How does it process the queries and parameters that are sent with the request? In this article, we will be discussing request handling on the server side.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eHandling a request\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eFor a basic NodeJS-based server, the code that handles any request will somewhat look like this.\u003c/p\u003e\n\u003cpre\u003eapp.METHOD(“/ROUTE”,MIDDLEWARES,FUNCTION)\u003c/pre\u003e\n\u003cp\u003eWell, the format looks pretty confusing. Let us analyze it with an example.\u003c/p\u003e\n\u003cp\u003eConsider the following code to get two numbers in request, add them and send the sum as the response.\u003c/p\u003e\n\u003ca href=\"https://medium.com/media/58d0a72c85c8505d365063b6717ebc23/href\"\u003ehttps://medium.com/media/58d0a72c85c8505d365063b6717ebc23/href\u003c/a\u003e\u003cp\u003eNow let us analyze it. First we created an instance of Express server, and added the following parts.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eMethod\u003c/strong\u003e — In the above example, we have used the \u003cstrong\u003e\u003cem\u003eget\u003c/em\u003e\u003c/strong\u003e word in place of METHOD. It shows what kind of request (GET, POST, PATCH, PUT or DELETE) is coming from the client.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eRoute\u003c/strong\u003e — Next we have the “/ROUTE” part. It defines the route or path that is attached to the URL. Each of these endpoints are declared separately inside the server-side code and the server can handle requests at these endpoints only. Here in the example, we declare that the piece of code will handle any incoming GET request with \u003cstrong\u003e\u003cem\u003e/add\u003c/em\u003e\u003c/strong\u003e as the endpoint. It then passes on the request data to the middleware.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eMiddleware\u003c/strong\u003e — Middleware is essentially an intermediate function. In simpler words, the request data passes through middleware and gets verified or modified. They help to reduce code complexity and can be used for multiple routes at once. Although, middleware is optional and it is not necessary to always have a middleware in the code. The parameters passed into this function are \u003cstrong\u003ereq\u003c/strong\u003e for request that comes, \u003cstrong\u003eres\u003c/strong\u003e for response to be sent back, \u003cstrong\u003enext\u003c/strong\u003e for the function that runs after the current middleware successfully executes. In the example, the \u003cstrong\u003echeckInteger\u003c/strong\u003e middleware will verify whether the data in the request is integer or not. If it is not an integer then we will send back an error message.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eMethod\u003c/strong\u003e — After the data passes through the middleware, it goes to the main function that will perform the desired function we wanted it to. The parameters this function receives is only for request and response. In our example request finally goes to the \u003cstrong\u003eaddNumbers\u003c/strong\u003e function where the two numbers will be added and sent back as response to the client.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eSending back a response\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eWe use the response parameter to send back the response. We have several methods to send the response. Each response contains an object that defines the data and other properties to be sent. We have different methods to send the response.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esend()\u003c/li\u003e\n\u003cli\u003eend()\u003c/li\u003e\n\u003cli\u003ejson()\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003eIn the above methods json() and send() are quite identical. They do the same thing, and json() calls send() in the end. Although in the end() method, we send a response without any data. It can be used for sending an error response like\u003c/blockquote\u003e\n\u003cpre\u003eres.status(404).end()\u003c/pre\u003e\n\u003cblockquote\u003eThe status() method helps to define the status of a response — whether it is a success (200) or an error (400,401,402,etc). This helps in better error handling and understanding the errors of the client side.\u003c/blockquote\u003e\n\u003cp\u003eLet’s run our server, and run it on Postman and see the response. Before proceeding, make sure you have the knowledge of sending requests from client. In case you don’t you can read from the blog below.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://medium.com/@kailash360/all-about-http-requests-and-response-3230cb0e8bea\"\u003eAll about HTTP Requests and Response\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eLet us add 2 numbers.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*dKw8-GNXqfVPRkKOIxBP6g.png\"\u003e\u003cfigcaption\u003eGetting sum of two numbers\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eTo verify whether our middleware is working correctly, we will send invalid data\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*9WfyAHsdRwy6nexoPHOXUA.png\"\u003e\u003cfigcaption\u003eGetting error for invalid data\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eHurray! our server is working as expected.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eHandling requests of different methods\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eNow we may need to handle different types of requests on the same route. We can do it in the following manner.\u003c/p\u003e\n\u003cpre\u003eapp.get(“/add”,checkInteger,addNumbers)\u003cbr\u003eapp.post(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.patch(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.put(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.delete(“/add”,checkIntegers,addNumbers)\u003c/pre\u003e\n\u003cp\u003eFor the other methods like POST, PUT, etc, the data is accessible in the request body. It is of different types like\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJSON (for simple text-based data)\u003c/li\u003e\n\u003cli\u003eFormdata (for files and media)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIn every request, the body needs to be parsed separately in the backend to extract the useful data. In the example below, we will add the numbers using a POST request and the numbers will be sent in the request body in JSON format.\u003c/p\u003e\n\u003ca href=\"https://medium.com/media/033eb79ae245cab947f47b25126238d6/href\"\u003ehttps://medium.com/media/033eb79ae245cab947f47b25126238d6/href\u003c/a\u003e\u003cp\u003eLet us test it.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*W-zwg0ORL5JdvnNw_bMabA.png\"\u003e\u003cfigcaption\u003eAdding 2 numbers using POST request\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eLet us check if our middleware is working properly.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*TFcQfhVj2wPZ7AGXV4cxNg.png\"\u003e\u003cfigcaption\u003eSending invalid data to check middleware\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eSo we have finally handled the incoming client requests on our server, and learnt to develop a complete client-server system based on NodeJS. In my next article, I will discuss JWT authentication and implementation — a must-know for all the developers.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHappy Coding!\u003c/em\u003e\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=1cef8f59a99a\" width=\"1\" height=\"1\" alt=\"\"\u003e\n",
                                "content": "\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*WAjU6RbBrNVCybaocLnfNw.jpeg\"\u003e\u003c/figure\u003e\u003cp\u003eIn my \u003ca href=\"https://medium.com/@kailash360\"\u003elast few blogs\u003c/a\u003e, I have discussed creating a NodeJS-based server, the different types of requests sent to the server and handling the response we get back from it. Now one may ask how will a server handle these requests? How does it process the queries and parameters that are sent with the request? In this article, we will be discussing request handling on the server side.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eHandling a request\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eFor a basic NodeJS-based server, the code that handles any request will somewhat look like this.\u003c/p\u003e\n\u003cpre\u003eapp.METHOD(“/ROUTE”,MIDDLEWARES,FUNCTION)\u003c/pre\u003e\n\u003cp\u003eWell, the format looks pretty confusing. Let us analyze it with an example.\u003c/p\u003e\n\u003cp\u003eConsider the following code to get two numbers in request, add them and send the sum as the response.\u003c/p\u003e\n\u003ca href=\"https://medium.com/media/58d0a72c85c8505d365063b6717ebc23/href\"\u003ehttps://medium.com/media/58d0a72c85c8505d365063b6717ebc23/href\u003c/a\u003e\u003cp\u003eNow let us analyze it. First we created an instance of Express server, and added the following parts.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eMethod\u003c/strong\u003e — In the above example, we have used the \u003cstrong\u003e\u003cem\u003eget\u003c/em\u003e\u003c/strong\u003e word in place of METHOD. It shows what kind of request (GET, POST, PATCH, PUT or DELETE) is coming from the client.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eRoute\u003c/strong\u003e — Next we have the “/ROUTE” part. It defines the route or path that is attached to the URL. Each of these endpoints are declared separately inside the server-side code and the server can handle requests at these endpoints only. Here in the example, we declare that the piece of code will handle any incoming GET request with \u003cstrong\u003e\u003cem\u003e/add\u003c/em\u003e\u003c/strong\u003e as the endpoint. It then passes on the request data to the middleware.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eMiddleware\u003c/strong\u003e — Middleware is essentially an intermediate function. In simpler words, the request data passes through middleware and gets verified or modified. They help to reduce code complexity and can be used for multiple routes at once. Although, middleware is optional and it is not necessary to always have a middleware in the code. The parameters passed into this function are \u003cstrong\u003ereq\u003c/strong\u003e for request that comes, \u003cstrong\u003eres\u003c/strong\u003e for response to be sent back, \u003cstrong\u003enext\u003c/strong\u003e for the function that runs after the current middleware successfully executes. In the example, the \u003cstrong\u003echeckInteger\u003c/strong\u003e middleware will verify whether the data in the request is integer or not. If it is not an integer then we will send back an error message.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003eMethod\u003c/strong\u003e — After the data passes through the middleware, it goes to the main function that will perform the desired function we wanted it to. The parameters this function receives is only for request and response. In our example request finally goes to the \u003cstrong\u003eaddNumbers\u003c/strong\u003e function where the two numbers will be added and sent back as response to the client.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003e\u003cstrong\u003eSending back a response\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eWe use the response parameter to send back the response. We have several methods to send the response. Each response contains an object that defines the data and other properties to be sent. We have different methods to send the response.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003esend()\u003c/li\u003e\n\u003cli\u003eend()\u003c/li\u003e\n\u003cli\u003ejson()\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003eIn the above methods json() and send() are quite identical. They do the same thing, and json() calls send() in the end. Although in the end() method, we send a response without any data. It can be used for sending an error response like\u003c/blockquote\u003e\n\u003cpre\u003eres.status(404).end()\u003c/pre\u003e\n\u003cblockquote\u003eThe status() method helps to define the status of a response — whether it is a success (200) or an error (400,401,402,etc). This helps in better error handling and understanding the errors of the client side.\u003c/blockquote\u003e\n\u003cp\u003eLet’s run our server, and run it on Postman and see the response. Before proceeding, make sure you have the knowledge of sending requests from client. In case you don’t you can read from the blog below.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://medium.com/@kailash360/all-about-http-requests-and-response-3230cb0e8bea\"\u003eAll about HTTP Requests and Response\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eLet us add 2 numbers.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*dKw8-GNXqfVPRkKOIxBP6g.png\"\u003e\u003cfigcaption\u003eGetting sum of two numbers\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eTo verify whether our middleware is working correctly, we will send invalid data\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*9WfyAHsdRwy6nexoPHOXUA.png\"\u003e\u003cfigcaption\u003eGetting error for invalid data\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eHurray! our server is working as expected.\u003c/p\u003e\n\u003ch3\u003e\u003cstrong\u003eHandling requests of different methods\u003c/strong\u003e\u003c/h3\u003e\n\u003cp\u003eNow we may need to handle different types of requests on the same route. We can do it in the following manner.\u003c/p\u003e\n\u003cpre\u003eapp.get(“/add”,checkInteger,addNumbers)\u003cbr\u003eapp.post(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.patch(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.put(“/add”,checkIntegers,addNumbers)\u003cbr\u003eapp.delete(“/add”,checkIntegers,addNumbers)\u003c/pre\u003e\n\u003cp\u003eFor the other methods like POST, PUT, etc, the data is accessible in the request body. It is of different types like\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eJSON (for simple text-based data)\u003c/li\u003e\n\u003cli\u003eFormdata (for files and media)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIn every request, the body needs to be parsed separately in the backend to extract the useful data. In the example below, we will add the numbers using a POST request and the numbers will be sent in the request body in JSON format.\u003c/p\u003e\n\u003ca href=\"https://medium.com/media/033eb79ae245cab947f47b25126238d6/href\"\u003ehttps://medium.com/media/033eb79ae245cab947f47b25126238d6/href\u003c/a\u003e\u003cp\u003eLet us test it.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*W-zwg0ORL5JdvnNw_bMabA.png\"\u003e\u003cfigcaption\u003eAdding 2 numbers using POST request\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eLet us check if our middleware is working properly.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/1*TFcQfhVj2wPZ7AGXV4cxNg.png\"\u003e\u003cfigcaption\u003eSending invalid data to check middleware\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eSo we have finally handled the incoming client requests on our server, and learnt to develop a complete client-server system based on NodeJS. In my next article, I will discuss JWT authentication and implementation — a must-know for all the developers.\u003c/p\u003e\n\u003cp\u003e\u003cem\u003eHappy Coding!\u003c/em\u003e\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=1cef8f59a99a\" width=\"1\" height=\"1\" alt=\"\"\u003e\n",

                                "title": "All about HTTP Requests and Response",
                                "pubDate": "2021-10-05 13:22:13",
                                "link": "https://medium.com/@kailash360/all-about-http-requests-and-response-3230cb0e8bea?source=rss-c660f17ebebd------2",
                                "guid": "https://medium.com/p/3230cb0e8bea",
                                "author": "Kailash Kejriwal",
                                "thumbnail": "https://cdn-images-1.medium.com/max/553/0*lkmBDedIN61vkwry",
                                "description": "\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/553/0*lkmBDedIN61vkwry\"\u003e\u003c/figure\u003e\u003cp\u003eIn my last article, I ended with a note that we will design routes to handle requests from clients and send a response. Before proceeding let me brief you about these terms.\u003c/p\u003e\n\u003ch3\u003eWhat are Request and Response?\u003c/h3\u003e\n\u003cp\u003eSo what is a ‘Request’? In our daily life, we often make requests to someone. We may request for some resources like books, money or anything else. Sometimes we may make a request for services like validation, or get some task done. Similar to that, we make ‘requests’ to the server for files, data, and other services.\u003c/p\u003e\n\u003cp\u003eAnd corresponding to each request, we get a ‘response’ back from the server which brings us the data we asked for, or tells us the status whether the task was successfully completed or not.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/850/0*sh5jXDayRfi90CNE.png\"\u003e\u003cfigcaption\u003eA Request-Response System\u003c/figcaption\u003e\u003c/figure\u003e\u003ch3\u003eMaking a Request\u003c/h3\u003e\n\u003cp\u003eNow, how to make a request? Application Program Interface or API is the intermediary that you use to make a request. Let us take an example. Consider the URL\u003c/p\u003e\n\u003cblockquote\u003e\u003ca href=\"https://jsonplaceholder.typicode.com/todos\"\u003e\u003cem\u003ehttps://jsonplaceholder.typicode.com/todos\u003c/em\u003e\u003c/a\u003e\u003c/blockquote\u003e\n\u003cp\u003eThis URL brings us random tasks in a todo list. Now lets understand how it is working. The part \u003ca href=\"https://jsonplaceholder.typicode.com/\"\u003e\u003cem\u003ehttps://jsonplaceholder.typicode.com\u003c/em\u003e\u003c/a\u003e is the domain. It is where all the requests will be made. The remaining part /posts is the path or route of API. It generally tells the server what kind of data you want and how you want it. The server then follows the route and prepares the data to be served to you. Finally it is sent back to the client in the form of a response; posts as shown in the example.\u003c/p\u003e\n\u003cp\u003eTo test our APIs, we generally use a tool called Postman. It helps us test our API endpoints. You can try it from here.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.postman.com/\"\u003ePostman API Platform | Sign Up for Free\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eLet’s test the URL in the example.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*dVJuCBto8FsprSzM\"\u003e\u003cfigcaption\u003eExample of a Request\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eHere you can see that we have our data in JSON format (the general format to exchange data between client and server). In the response, all the objects are clubbed together into an array where each of the objects represent a post. Each post again has 4 properties or ‘fields’ namely userId, id, title and body.\u003c/p\u003e\n\u003ch3\u003eQueries and Parameters\u003c/h3\u003e\n\u003cp\u003eNow, what if we want to fetch a single post based on the id of the task. Parameters and queries come into the picture here. Queries are set within the route, while parameters are sent as separate variables inside the route. Each query or parameter represents the field based on which the response data will be filtered.\u003c/p\u003e\n\u003cp\u003eSuppose we want to bring the post having id of 2.\u003c/p\u003e\n\u003cp\u003eUsing query,\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*aC5ihmxt5W0tLjYt\"\u003e\u003cfigcaption\u003eFetching filtered data using query\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eUsing parameters,\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*2IHC6FfmKp_MOlYW\"\u003e\u003cfigcaption\u003eFetching filtered data using parameter\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eSo you can see that the response in both the cases is the same, although the request URL is different. You can apply multiple parameters in a request URL by appending the key-value pair with the ‘\u0026amp;’ character.\u003c/p\u003e\n\u003ch3\u003eRequest Headers\u003c/h3\u003e\n\u003cp\u003eBefore moving on, let me brief you about headers. Request Header is an object that stores the information of the request, like the content-type within the request body, any authorization field, etc. Similarly, response headers store information about the response. A response header would look like\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*gnDTMUulYD-9X22K\"\u003e\u003c/figure\u003e\u003ch3\u003eRequest Methods\u003c/h3\u003e\n\u003cp\u003eIn all the above examples we observe that the request method is set to GET. You may ask what is a ‘request method’? Well,Request Methods define the primary action that we are asking the server to perform. There are generally 5 types of request methods:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eGET\u003c/strong\u003e: As already seen above, this method simply ‘gets’ or brings us the data we want. This is the most simple one of all. If you want to filter the data based on some specific properties, you can add queries or parameters as shown before.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003ePOST\u003c/strong\u003e: Whenever you make a GET request, the parameters get exposed in the request URL. Now, if it is some sensitive data like a password, it may get exposed to someone. So we need to hide the data we are sending. Here, the POST request comes into play. For a post request, we define a body field which contains the data we want to send and the body remains non-exposed throughout the session. We can also send media files within the body, which is not possible for a GET request.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLet us test a POST request with userId = 1.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*ndAvwi9YsuGnOJK0\"\u003e\u003c/figure\u003e\u003cp\u003eSo, a new post is created with an id of 101.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003ePUT\u003c/strong\u003e: It is used to update the current data in the database, or add new new data into the database. Let us modify the body of the blog with id of 1.\u003c/li\u003e\u003c/ul\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*Y6f5JVSYmvCgkFNH\"\u003e\u003c/figure\u003e\u003cp\u003eSo, the body now has the modified data that we have inserted.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003ePATCH\u003c/strong\u003e: This method is similar to put except that it gives the server the instructions on how to update or modify the data. Let us patch the title of the blog with id of 2.\u003c/li\u003e\u003c/ul\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*avHWXcWDU5UqHeh_\"\u003e\u003c/figure\u003e\u003cp\u003eThe data ,here too, gets updated.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003eDELETE\u003c/strong\u003e: As the name suggests, it is used to perform a delete operation, and remove data from the database.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eLet us delete the post with id of 2\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*qtbbD0X_9WXfpmUv\"\u003e\u003c/figure\u003e\u003cp\u003eNow that you know about request and its types, response, queries, parameters, headers, you can easily customize request URLs and fetch data as per your need.\u003c/p\u003e\n\u003cp\u003eIn my next blog, I will explain about handling of client requests by a server.\u003c/p\u003e\n\u003cp\u003eThank You. Keep Coding !\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=3230cb0e8bea\" width=\"1\" height=\"1\" alt=\"\"\u003e\n",
                                "content": "\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/553/0*lkmBDedIN61vkwry\"\u003e\u003c/figure\u003e\u003cp\u003eIn my last article, I ended with a note that we will design routes to handle requests from clients and send a response. Before proceeding let me brief you about these terms.\u003c/p\u003e\n\u003ch3\u003eWhat are Request and Response?\u003c/h3\u003e\n\u003cp\u003eSo what is a ‘Request’? In our daily life, we often make requests to someone. We may request for some resources like books, money or anything else. Sometimes we may make a request for services like validation, or get some task done. Similar to that, we make ‘requests’ to the server for files, data, and other services.\u003c/p\u003e\n\u003cp\u003eAnd corresponding to each request, we get a ‘response’ back from the server which brings us the data we asked for, or tells us the status whether the task was successfully completed or not.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/850/0*sh5jXDayRfi90CNE.png\"\u003e\u003cfigcaption\u003eA Request-Response System\u003c/figcaption\u003e\u003c/figure\u003e\u003ch3\u003eMaking a Request\u003c/h3\u003e\n\u003cp\u003eNow, how to make a request? Application Program Interface or API is the intermediary that you use to make a request. Let us take an example. Consider the URL\u003c/p\u003e\n\u003cblockquote\u003e\u003ca href=\"https://jsonplaceholder.typicode.com/todos\"\u003e\u003cem\u003ehttps://jsonplaceholder.typicode.com/todos\u003c/em\u003e\u003c/a\u003e\u003c/blockquote\u003e\n\u003cp\u003eThis URL brings us random tasks in a todo list. Now lets understand how it is working. The part \u003ca href=\"https://jsonplaceholder.typicode.com/\"\u003e\u003cem\u003ehttps://jsonplaceholder.typicode.com\u003c/em\u003e\u003c/a\u003e is the domain. It is where all the requests will be made. The remaining part /posts is the path or route of API. It generally tells the server what kind of data you want and how you want it. The server then follows the route and prepares the data to be served to you. Finally it is sent back to the client in the form of a response; posts as shown in the example.\u003c/p\u003e\n\u003cp\u003eTo test our APIs, we generally use a tool called Postman. It helps us test our API endpoints. You can try it from here.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.postman.com/\"\u003ePostman API Platform | Sign Up for Free\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eLet’s test the URL in the example.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*dVJuCBto8FsprSzM\"\u003e\u003cfigcaption\u003eExample of a Request\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eHere you can see that we have our data in JSON format (the general format to exchange data between client and server). In the response, all the objects are clubbed together into an array where each of the objects represent a post. Each post again has 4 properties or ‘fields’ namely userId, id, title and body.\u003c/p\u003e\n\u003ch3\u003eQueries and Parameters\u003c/h3\u003e\n\u003cp\u003eNow, what if we want to fetch a single post based on the id of the task. Parameters and queries come into the picture here. Queries are set within the route, while parameters are sent as separate variables inside the route. Each query or parameter represents the field based on which the response data will be filtered.\u003c/p\u003e\n\u003cp\u003eSuppose we want to bring the post having id of 2.\u003c/p\u003e\n\u003cp\u003eUsing query,\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*aC5ihmxt5W0tLjYt\"\u003e\u003cfigcaption\u003eFetching filtered data using query\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eUsing parameters,\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*2IHC6FfmKp_MOlYW\"\u003e\u003cfigcaption\u003eFetching filtered data using parameter\u003c/figcaption\u003e\u003c/figure\u003e\u003cp\u003eSo you can see that the response in both the cases is the same, although the request URL is different. You can apply multiple parameters in a request URL by appending the key-value pair with the ‘\u0026amp;’ character.\u003c/p\u003e\n\u003ch3\u003eRequest Headers\u003c/h3\u003e\n\u003cp\u003eBefore moving on, let me brief you about headers. Request Header is an object that stores the information of the request, like the content-type within the request body, any authorization field, etc. Similarly, response headers store information about the response. A response header would look like\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*gnDTMUulYD-9X22K\"\u003e\u003c/figure\u003e\u003ch3\u003eRequest Methods\u003c/h3\u003e\n\u003cp\u003eIn all the above examples we observe that the request method is set to GET. You may ask what is a ‘request method’? Well,Request Methods define the primary action that we are asking the server to perform. There are generally 5 types of request methods:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cstrong\u003eGET\u003c/strong\u003e: As already seen above, this method simply ‘gets’ or brings us the data we want. This is the most simple one of all. If you want to filter the data based on some specific properties, you can add queries or parameters as shown before.\u003c/li\u003e\n\u003cli\u003e\n\u003cstrong\u003ePOST\u003c/strong\u003e: Whenever you make a GET request, the parameters get exposed in the request URL. Now, if it is some sensitive data like a password, it may get exposed to someone. So we need to hide the data we are sending. Here, the POST request comes into play. For a post request, we define a body field which contains the data we want to send and the body remains non-exposed throughout the session. We can also send media files within the body, which is not possible for a GET request.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eLet us test a POST request with userId = 1.\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*ndAvwi9YsuGnOJK0\"\u003e\u003c/figure\u003e\u003cp\u003eSo, a new post is created with an id of 101.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003ePUT\u003c/strong\u003e: It is used to update the current data in the database, or add new new data into the database. Let us modify the body of the blog with id of 1.\u003c/li\u003e\u003c/ul\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*Y6f5JVSYmvCgkFNH\"\u003e\u003c/figure\u003e\u003cp\u003eSo, the body now has the modified data that we have inserted.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003ePATCH\u003c/strong\u003e: This method is similar to put except that it gives the server the instructions on how to update or modify the data. Let us patch the title of the blog with id of 2.\u003c/li\u003e\u003c/ul\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*avHWXcWDU5UqHeh_\"\u003e\u003c/figure\u003e\u003cp\u003eThe data ,here too, gets updated.\u003c/p\u003e\n\u003cul\u003e\u003cli\u003e\n\u003cstrong\u003eDELETE\u003c/strong\u003e: As the name suggests, it is used to perform a delete operation, and remove data from the database.\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003eLet us delete the post with id of 2\u003c/p\u003e\n\u003cfigure\u003e\u003cimg alt=\"\" src=\"https://cdn-images-1.medium.com/max/1024/0*qtbbD0X_9WXfpmUv\"\u003e\u003c/figure\u003e\u003cp\u003eNow that you know about request and its types, response, queries, parameters, headers, you can easily customize request URLs and fetch data as per your need.\u003c/p\u003e\n\u003cp\u003eIn my next blog, I will explain about handling of client requests by a server.\u003c/p\u003e\n\u003cp\u003eThank You. Keep Coding !\u003c/p\u003e\n\u003cimg src=\"https://medium.com/_/stat?event=post.clientViewed\u0026amp;referrerSource=full_rss\u0026amp;postId=3230cb0e8bea\" width=\"1\" height=\"1\" alt=\"\"\u003e\n",
